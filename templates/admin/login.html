<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Admin — Gonzalo Agentes IA</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0a0f1e;min-height:100vh;display:flex;align-items:center;justify-content:center;}
.card{background:#111827;border:1px solid #1f2937;border-radius:20px;padding:40px;width:100%;max-width:400px;}
.logo{text-align:center;margin-bottom:28px;}
.logo-icon{width:56px;height:56px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:16px;display:inline-flex;align-items:center;justify-content:center;font-size:26px;color:white;margin-bottom:12px;}
.logo-title{font-size:20px;font-weight:700;color:#f1f5f9;}
.logo-sub{font-size:13px;color:#64748b;margin-top:4px;}
.label{display:block;font-size:12px;font-weight:600;color:#94a3b8;margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px;}
.input{width:100%;background:#1f2937;border:1px solid #374151;color:#f1f5f9;border-radius:10px;padding:12px 14px;font-size:14px;margin-bottom:14px;transition:border-color .15s;font-family:inherit;}
.input:focus{outline:none;border-color:#6366f1;}
.input::placeholder{color:#4b5563;}
.btn{width:100%;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:white;border:none;border-radius:10px;padding:13px;font-size:15px;font-weight:600;cursor:pointer;}
.btn:hover{opacity:.9;}
.flash{padding:11px 14px;border-radius:10px;font-size:13px;margin-bottom:14px;background:rgba(239,68,68,.15);color:#f87171;border:1px solid rgba(239,68,68,.3);display:flex;align-items:center;gap:8px;}
.footer-note{font-size:11px;color:#4b5563;text-align:center;margin-top:14px;}
.back-link{text-align:center;margin-top:16px;font-size:13px;color:#64748b;}
.back-link a{color:#6366f1;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon"><i class="fa-solid fa-shield-halved"></i></div>
    <div class="logo-title">Panel Admin</div>
    <div class="logo-sub">Acceso restringido — solo Gonzalo Valles</div>
  </div>
  {% with msgs = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in msgs %}<div class="flash"><i class="fa-solid fa-circle-xmark"></i> {{ msg }}</div>{% endfor %}
  {% endwith %}
  <form method="POST">
    <label class="label">Usuario</label>
    <input name="username" class="input" placeholder="Tu usuario" autocomplete="username" required/>
    <label class="label">Contraseña</label>
    <input name="password" type="password" class="input" placeholder="Tu contraseña" autocomplete="current-password" required/>
    <button type="submit" class="btn"><i class="fa-solid fa-arrow-right-to-bracket"></i> Ingresar al panel</button>
  </form>
  <div class="footer-note"><i class="fa-solid fa-lock"></i> Conexión segura · Solo administrador autorizado</div>
  <div class="back-link"><a href="/"><i class="fa-solid fa-arrow-left"></i> Volver al sitio público</a></div>
</div>
</body>
</html>
