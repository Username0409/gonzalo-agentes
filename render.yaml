services:
  - type: web
    name: gonzalo-agentes-ia
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: ADMIN_USER
        value: gonzalo
      - key: ADMIN_PASS
        generateValue: true
      - key: SECRET_KEY
        generateValue: true
